<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma ja Elsa seikkailee eri maailmoissa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0015;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden;}

/* STARS */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:0.2;transform:scale(1);}to{opacity:1;transform:scale(1.4);}}

/* TITLE SCREEN */
#titlescreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a0040 0%,#0a0015 100%);}
.title-main{font-size:clamp(28px,6vw,56px);font-weight:900;color:#FFD93B;text-shadow:0 0 30px #FF6FA4,0 0 60px #7C6BF0;text-align:center;line-height:1.2;animation:pulse 2s infinite alternate;}
.title-sub{font-size:clamp(14px,3vw,22px);color:#C8A2F0;margin:12px 0 40px;text-align:center;}
@keyframes pulse{from{text-shadow:0 0 20px #FF6FA4,0 0 40px #7C6BF0;}to{text-shadow:0 0 40px #FF6FA4,0 0 80px #7C6BF0,0 0 120px #FFD93B;}}
.world-select{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;max-width:800px;width:90%;padding:0 16px;}
.world-btn{padding:18px 10px;border-radius:18px;border:2px solid rgba(255,255,255,0.2);cursor:pointer;font-size:15px;font-weight:700;color:#fff;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(4px);}
.world-btn:hover{transform:scale(1.07);border-color:#FFD93B;box-shadow:0 0 20px rgba(255,217,59,0.4);}
.world-btn .wicon{font-size:36px;}
.world-btn.space{background:linear-gradient(135deg,#0d0d2b,#1a1a4e);}
.world-btn.ocean{background:linear-gradient(135deg,#003366,#006699);}
.world-btn.jungle{background:linear-gradient(135deg,#0d2b0d,#1a5c1a);}
.world-btn.ice{background:linear-gradient(135deg,#0d2b40,#a8d8ea);}
.world-btn.fairy{background:linear-gradient(135deg,#2d0d3d,#8B4DB8);}
.world-btn.mushroom{background:linear-gradient(135deg,#2b0d0d,#cc4444);}
.world-btn.future{background:linear-gradient(135deg,#0d1a2b,#00cccc);}
.world-btn.circus{background:linear-gradient(135deg,#2b0000,#cc2200);}

/* GAME SCREEN */
#gamescreen{position:relative;z-index:10;display:none;min-height:100vh;}
#worldbg{position:fixed;inset:0;z-index:1;transition:background 0.8s;}
#worldbg-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;}

.game-ui{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:10px 8px 20px;}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;margin-bottom:10px;}
.world-title{font-size:clamp(16px,4vw,26px);font-weight:800;color:#FFD93B;text-shadow:0 0 12px currentColor;}
.back-btn{padding:8px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.4);color:#fff;font-size:14px;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(4px);}
.back-btn:hover{border-color:#FFD93B;background:rgba(255,217,59,0.15);}

/* CHARACTER STAGE */
.stage{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:10px 0;}
.char-slot{display:flex;flex-direction:column;align-items:center;gap:6px;}
.char-name{font-size:13px;font-weight:700;color:#FFD93B;text-shadow:0 0 8px currentColor;}
.char-wrap{background:rgba(255,255,255,0.08);border-radius:20px;padding:6px;border:2px solid rgba(255,255,255,0.15);backdrop-filter:blur(4px);cursor:pointer;transition:all 0.2s;}
.char-wrap:hover{border-color:#FFD93B;box-shadow:0 0 20px rgba(255,217,59,0.3);}
.char-wrap.selected{border-color:#FF6FA4;box-shadow:0 0 24px rgba(255,111,164,0.5);}

/* CONTROLS */
.controls-area{width:100%;max-width:900px;background:rgba(0,0,0,0.55);border-radius:20px;padding:14px;border:1.5px solid rgba(255,255,255,0.12);backdrop-filter:blur(8px);}
.selected-label{font-size:13px;color:#C8A2F0;margin-bottom:10px;text-align:center;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tab{padding:7px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#aaa;font-size:13px;cursor:pointer;transition:all 0.15s;}
.tab.on{background:#7C6BF0;border-color:#9B8BFF;color:#fff;box-shadow:0 0 10px #7C6BF066;}
.panel{display:none;}
.panel.on{display:block;}
.row-label{font-size:11px;font-weight:700;color:#C8A2F0;margin:8px 0 5px;text-transform:uppercase;letter-spacing:0.5px;}
.btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.opt{padding:7px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);font-size:13px;cursor:pointer;color:#ddd;transition:all 0.15s;}
.opt:hover{background:rgba(255,255,255,0.14);border-color:#7C6BF0;}
.opt.on{background:#7C6BF0;border-color:#9B8BFF;color:#fff;}
.swatch{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.15s;}
.swatch:hover{transform:scale(1.18);border-color:#fff;}
.swatch.on{border:3px solid #FFD93B;box-shadow:0 0 10px #FFD93B88;transform:scale(1.12);}

/* BOTTOM BUTTONS */
.bottom-btns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
.surprise-btn{flex:1;min-width:140px;padding:12px;border:none;border-radius:14px;background:linear-gradient(90deg,#FF6FA4,#7C6BF0);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.surprise-btn:hover{opacity:0.85;}
.world-change-btn{flex:1;min-width:140px;padding:12px;border:2px solid #FFD93B;border-radius:14px;background:transparent;color:#FFD93B;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.world-change-btn:hover{background:rgba(255,217,59,0.15);}

/* WORLD FLOATING ELEMENTS */
.floaty{position:fixed;pointer-events:none;z-index:3;font-size:28px;animation:float 6s infinite ease-in-out;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(8deg);}}

@media(max-width:600px){.stage{gap:10px;}.char-wrap svg{width:140px!important;}}
</style>
</head>
<body>

<div id="stars"></div>

<!-- TITLE SCREEN -->
<div id="titlescreen">
  <div class="title-main">🌟 Alma ja Elsa<br>seikkailee! 🌟</div>
  <div class="title-sub">Valitse maailma johon haluat mennä</div>
  <div class="world-select">
    <button class="world-btn space" onclick="enterWorld('space')"><span class="wicon">🚀</span>Avaruus</button>
    <button class="world-btn ocean" onclick="enterWorld('ocean')"><span class="wicon">🌊</span>Merenpohja</button>
    <button class="world-btn jungle" onclick="enterWorld('jungle')"><span class="wicon">🌴</span>Viidakko</button>
    <button class="world-btn ice" onclick="enterWorld('ice')"><span class="wicon">❄️</span>Jäämaailma</button>
    <button class="world-btn fairy" onclick="enterWorld('fairy')"><span class="wicon">🧚</span>Satumaailma</button>
    <button class="world-btn mushroom" onclick="enterWorld('mushroom')"><span class="wicon">🍄</span>Sienimaailma</button>
    <button class="world-btn future" onclick="enterWorld('future')"><span class="wicon">🤖</span>Tulevaisuus</button>
    <button class="world-btn circus" onclick="enterWorld('circus')"><span class="wicon">🎪</span>Sirkus</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gamescreen">
  <div id="worldbg"></div>
  <div id="worldbg-overlay"></div>
  <div id="floaties"></div>

  <div class="game-ui">
    <div class="topbar">
      <div class="world-title" id="worldTitle">🚀 Avaruus</div>
      <button class="back-btn" onclick="goBack()">← Vaihda maailmaa</button>
    </div>

    <div class="stage">
      <div class="char-slot">
        <div class="char-name">⭐ Alma</div>
        <div class="char-wrap" id="wrapA" onclick="selectChar('A')">
          <svg id="dollA" viewBox="0 0 320 420" width="180" style="--skin:#FFE0BD;--hair:#E2574C;--outfit:#FF6FA4;"></svg>
        </div>
      </div>
      <div class="char-slot">
        <div class="char-name">💜 Elsa</div>
        <div class="char-wrap" id="wrapB" onclick="selectChar('B')">
          <svg id="dollB" viewBox="0 0 320 420" width="180" style="--skin:#F1C27D;--hair:#5BC0EB;--outfit:#7C6BF0;"></svg>
        </div>
      </div>
    </div>

    <div class="controls-area">
      <div class="selected-label" id="selLabel">✨ Valitset Almaa — klikkaa hahmoa vaihtaaksesi!</div>

      <div class="tabs">
        <button class="tab on" onclick="setTab('hahmo')">Hahmo</button>
        <button class="tab" onclick="setTab('hiukset')">Hiukset</button>
        <button class="tab" onclick="setTab('vaatteet')">Vaatteet</button>
        <button class="tab" onclick="setTab('paahine')">Päähine</button>
        <button class="tab" onclick="setTab('lisaosa')">Lisäosa</button>
        <button class="tab" onclick="setTab('varit')">Värit</button>
      </div>

      <div id="p_hahmo" class="panel on">
        <div class="row-label">Hahmotyyppi</div>
        <div class="btns" id="b_type"></div>
        <div class="row-label">Ilme</div>
        <div class="btns" id="b_expr"></div>
        <div class="row-label">Ihonväri</div>
        <div class="btns" id="b_skin"></div>
        <div class="row-label">Silmien väri</div>
        <div class="btns" id="b_eye"></div>
      </div>

      <div id="p_hiukset" class="panel">
        <div class="row-label">Hiusmalli</div>
        <div class="btns" id="b_hair"></div>
        <div class="row-label">Hiusten väri</div>
        <div class="btns" id="b_hairc"></div>
      </div>

      <div id="p_vaatteet" class="panel">
        <div class="row-label">Asu</div>
        <div class="btns" id="b_outfit"></div>
        <div class="row-label">Asun väri</div>
        <div class="btns" id="b_outc"></div>
      </div>

      <div id="p_paahine" class="panel">
        <div class="row-label">Päähine</div>
        <div class="btns" id="b_head"></div>
      </div>

      <div id="p_lisaosa" class="panel">
        <div class="row-label">Lisäosa</div>
        <div class="btns" id="b_extra"></div>
      </div>

      <div id="p_varit" class="panel">
        <div class="row-label">Vaatteiden väri</div>
        <div class="btns" id="b_outc2"></div>
        <div class="row-label">Hiusten väri</div>
        <div class="btns" id="b_hairc2"></div>
        <div class="row-label">Ihonväri</div>
        <div class="btns" id="b_skin2"></div>
      </div>

      <div class="bottom-btns">
        <button class="surprise-btn" onclick="surprise()">🎲 Yllätä minut!</button>
        <button class="world-change-btn" onclick="goBack()">🌍 Vaihda maailmaa</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const SKIN=['#FFE9D6','#FFE0BD','#FFD1B0','#F7D7C4','#F1C27D','#E8B173','#C68642','#8D5524','#4A2F1B','#B8E994','#C8A2F0','#9BD3FF','#FF9FB2','#FF6B6B','#7EFFF5'];
const HAIRC=['#1a0e08','#3A2A1A','#9B5A1E','#F0C84B','#E2574C','#7C5CD6','#F07CC4','#F2F2F2','#5BC0EB','#56D45B','#FF8C42','#FF4FB3','#00e5ff'];
const OUTFC=['#FF6FA4','#7C6BF0','#34C3A6','#FFC93C','#5BA8F5','#FF8C42','#E84393','#56D45B','#FF4D6D','#9B6BF0','#E84242','#34A8C3','#fff','#FFD93B','#FF5722'];
const EYEC=['#6B4A2E','#2E6B4A','#2E4A6B','#6B2E2E','#4A2E6B','#2E6B6B','#00e5ff','#FF4FB3'];

const TYPES=['Ihminen','Kissa 🐱','Pupu 🐰','Karhu 🐻','Kettu 🦊','Lohikäärme 🐉','Klovni 🤡','Noita 🧙','Prinsessa 👸','Supersankari 🦸','Merenneito 🧜','Robotti 🤖','Yksisarvinen 🦄','Keiju 🧚','Pingviini 🐧'];
const EXPR=['Iloinen 😊','Nauru 😄','Yllättynyt 😮','Tyyni 😌','Siisti 😎','Rakastunut 🥰'];
const HAIRS=['Pitkät','Polkka','Letit','Kiharat','Ei hiuksia','Nuttura','Aallot','Piikit','Afro','Sivuletit','Otsahius','Lyhyet'];
const OUTFITS=['Mekko','T-paita','Tutu','Viitta','Sirkusasu','Tähtimekko','Haalari','Bleiseri','Kimono','Haarniska','Bikinit','Astronauttiasu','Prinsessamekko','Noitakaappu','Supersankaripuku'];
const HEADS=['Ei mitään','Kruunu 👑','Jesterihattu','Silinteri 🎩','Tähtipanta','Kukka 🌸','Rusetti','Lippis','Noitahattu','Tiara','Helmet','Kypärä','Sarvit','Korvat','Halo ✨'];
const EXTRAS=['Ei mitään','Siivet 🪽','Taikasauva ✨','Kaulakoru','Reppu','Huivi','Lasit','Miekka','Kitara 🎸','Kilpi','Jousi & nuoli','Laterna','Kukat','Häntä','Tridentti'];

const WORLDS={
  space:{name:'🚀 Avaruus',bg:'radial-gradient(ellipse at 30% 20%,#0d0040 0%,#000015 60%,#000 100%)',floats:['🌟','⭐','🪐','🌙','☄️','🛸','💫','🌠'],outfits:[11,4],heads:[4,10],extras:[1,2]},
  ocean:{name:'🌊 Merenpohja',bg:'radial-gradient(ellipse at 50% 0%,#003399 0%,#001155 50%,#000520 100%)',floats:['🐠','🐟','🦑','🐙','🦀','🐚','🌊','🐬'],outfits:[10,0],heads:[0,9],extras:[12,0]},
  jungle:{name:'🌴 Viidakko',bg:'radial-gradient(ellipse at 50% 0%,#0a3d0a 0%,#052005 60%,#010e01 100%)',floats:['🦋','🌺','🦜','🐍','🌿','🦩','🌸','🍃'],outfits:[3,0],heads:[5,0],extras:[12,0]},
  ice:{name:'❄️ Jäämaailma',bg:'radial-gradient(ellipse at 50% 0%,#a8d8ea 0%,#2255aa 40%,#001133 100%)',floats:['❄️','🌨️','🏔️','⛄','🦢','🌬️','💎','🧊'],outfits:[2,0],heads:[10,0],extras:[1,0]},
  fairy:{name:'🧚 Satumaailma',bg:'radial-gradient(ellipse at 50% 20%,#4a0080 0%,#1a003d 60%,#0a001a 100%)',floats:['🧚','🌈','⭐','🦄','🍄','🌙','💜','🌸'],outfits:[5,12],heads:[1,9],extras:[1,2]},
  mushroom:{name:'🍄 Sienimaailma',bg:'radial-gradient(ellipse at 50% 30%,#330000 0%,#1a0000 60%,#0a0000 100%)',floats:['🍄','🐛','🐝','🌿','💊','🌟','🦋','🐞'],outfits:[0,6],heads:[5,0],extras:[2,12]},
  future:{name:'🤖 Tulevaisuus',bg:'radial-gradient(ellipse at 50% 0%,#001a33 0%,#000d1a 60%,#000 100%)',floats:['🤖','⚡','💻','🔮','🛸','⚙️','💡','📡'],outfits:[11,6],heads:[11,0],extras:[6,0]},
  circus:{name:'🎪 Sirkus',bg:'radial-gradient(ellipse at 50% 0%,#330000 0%,#1a0000 60%,#000 100%)',floats:['🎪','🎭','🎠','🎡','🤹','🎯','🎈','🎶'],outfits:[4,12],heads:[1,0],extras:[2,7]},
};

// ── STATE ──────────────────────────────────────────────────────────────────
let curWorld='space';
let curChar='A';
const chars={
  A:{type:0,expr:0,skin:1,eye:0,hair:0,hairc:4,outfit:0,outc:0,head:0,extra:0},
  B:{type:0,expr:0,skin:4,eye:2,hair:2,hairc:8,outfit:0,outc:1,head:0,extra:0},
};

// ── STARS ─────────────────────────────────────────────────────────────────
(function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2.5}px;height:${1+Math.random()*2.5}px;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*3}s;`;
    c.appendChild(s);
  }
})();

// ── SVG BUILDER ───────────────────────────────────────────────────────────
function buildSVG(id,st){
  const svg=document.getElementById(id);
  svg.style.setProperty('--skin',SKIN[st.skin]);
  svg.style.setProperty('--hair',HAIRC[st.hairc]);
  svg.style.setProperty('--outfit',OUTFC[st.outc]);
  svg.innerHTML=svgContent(st);
}

function svgContent(st){
  const skin=SKIN[st.skin];const hair=HAIRC[st.hairc];const outfit=OUTFC[st.outc];const eye=EYEC[st.eye];
  let s='';
  // glow
  s+=`<defs><radialGradient id="glow" cx="50%" cy="44%" r="52%"><stop offset="0%" stop-color="#fff" stop-opacity="0.3"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient></defs>`;
  // wings behind
  if(st.extra===1)s+=`<path d="M100 210 Q40 170 25 240 Q60 248 100 228Z" fill="#EAD9FF" stroke="#C9A8FF" stroke-width="2.5"/><path d="M100 232 Q38 248 32 295 Q70 285 102 260Z" fill="#FBE3F1" stroke="#F0B6D6" stroke-width="2.5"/><path d="M220 210 Q280 170 295 240 Q260 248 220 228Z" fill="#EAD9FF" stroke="#C9A8FF" stroke-width="2.5"/><path d="M220 232 Q282 248 288 295 Q250 285 218 260Z" fill="#FBE3F1" stroke="#F0B6D6" stroke-width="2.5"/>`;
  // legs
  s+=`<rect x="130" y="295" width="20" height="75" rx="10" fill="${skin}"/><rect x="170" y="295" width="20" height="75" rx="10" fill="${skin}"/><ellipse cx="140" cy="372" rx="20" ry="12" fill="#4a3a5a"/><ellipse cx="180" cy="372" rx="20" ry="12" fill="#4a3a5a"/>`;
  // arms
  s+=`<rect x="82" y="205" width="20" height="78" rx="10" fill="${skin}"/><rect x="218" y="205" width="20" height="78" rx="10" fill="${skin}"/><circle cx="92" cy="287" r="13" fill="${skin}"/><circle cx="228" cy="287" r="13" fill="${skin}"/>`;
  // outfit
  s+=outfitSVG(st.outfit,outfit,skin);
  // neck
  s+=`<rect x="148" y="165" width="24" height="34" rx="11" fill="${skin}"/>`;
  // head
  s+=`<circle cx="160" cy="128" r="60" fill="${skin}"/>`;
  s+=`<ellipse cx="160" cy="98" rx="18" ry="12" fill="#fff" opacity="0.1"/>`;
  // hair behind
  s+=hairBehind(st.hair,hair);
  // face
  s+=faceSVG(st.expr,eye,skin,hair);
  // hair front
  s+=hairFront(st.hair,hair);
  // animal type
  s+=typeSVG(st.type,skin);
  // headwear
  s+=headSVG(st.head,outfit);
  // extra (front)
  s+=extraFront(st.extra);
  // glow
  s+=`<ellipse cx="160" cy="220" rx="120" ry="165" fill="url(#glow)"/>`;
  return s;
}

function outfitSVG(i,c,skin){
  const o=[
    // 0 mekko
    `<path d="M112 185 Q160 170 208 185 L232 310 Q160 330 88 310Z" fill="${c}"/><path d="M112 185 Q160 170 208 185 L215 208 Q160 194 105 208Z" fill="#fff" opacity="0.15"/><circle cx="160" cy="238" r="7" fill="#fff" opacity="0.6"/><circle cx="160" cy="268" r="7" fill="#fff" opacity="0.6"/>`,
    // 1 t-paita
    `<rect x="112" y="183" width="96" height="72" rx="14" fill="${c}"/><rect x="112" y="183" width="96" height="18" rx="9" fill="#fff" opacity="0.13"/><rect x="158" y="252" width="36" height="68" rx="9" fill="#4A5568"/><rect x="126" y="252" width="36" height="68" rx="9" fill="#4A5568"/>`,
    // 2 tutu
    `<path d="M112 185 Q160 173 208 185 L220 246 L100 246Z" fill="${c}"/><path d="M88 246 Q160 228 232 246 L244 290 Q160 272 76 290Z" fill="#fff" opacity="0.82"/><path d="M84 282 Q160 264 236 282 L244 312 Q160 296 76 312Z" fill="${c}"/>`,
    // 3 viitta
    `<path d="M112 185 Q160 170 208 185 L222 308 Q160 328 98 308Z" fill="${c}"/><path d="M208 187 Q272 204 264 298 L240 288 Q246 220 206 208Z" fill="${c}" opacity="0.8"/><path d="M155 198 L165 198 L175 217 L160 230 L145 217Z" fill="#FFD93B"/>`,
    // 4 sirkusasu

// ── WORLD ─────────────────────────────────────────────────────────────────
function enterWorld(w){
  curWorld=w;
  const wd=WORLDS[w];
  document.getElementById('titlescreen').style.display='none';
  document.getElementById('gamescreen').style.display='block';
  document.getElementById('worldbg').style.background=wd.bg;
  document.getElementById('worldTitle').textContent=wd.name;
  // floaties
  const fc=document.getElementById('floaties');
  fc.innerHTML='';
  wd.floats.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='floaty';
    d.textContent=f;
    d.style.cssText=`left:${5+Math.random()*88}%;top:${10+Math.random()*75}%;animation-delay:${i*0.8}s;font-size:${22+Math.random()*24}px;`;
    fc.appendChild(d);
  });
  renderAll();
  buildControls();
  selectChar('A');
}

function goBack(){
  document.getElementById('titlescreen').style.display='flex';
  document.getElementById('gamescreen').style.display='none';
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
function buildControls(){
  btn('b_type',TYPES,'type',false);
  btn('b_expr',EXPR,'expr',false);
  btn('b_skin',SKIN,'skin',true);
  btn('b_eye',EYEC,'eye',true);
  btn('b_hair',HAIRS,'hair',false);
  btn('b_hairc',HAIRC,'hairc',true);
  btn('b_outfit',OUTFITS,'outfit',false);
  btn('b_outc',OUTFC,'outc',true);
  btn('b_outc2',OUTFC,'outc',true);
  btn('b_hairc2',HAIRC,'hairc',true);
  btn('b_skin2',SKIN,'skin',true);
  btn('b_head',HEADS,'head',false);
  btn('b_extra',EXTRAS,'extra',false);
  refreshActive();
}

function btn(id,arr,key,colors){
  const el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='';
  arr.forEach((it,i)=>{
    const b=document.createElement('button');
    if(colors){
      b.className='swatch';
      b.style.background=it;
      b.title=it;
    } else {
      b.className='opt';
      b.textContent=(it.n!==undefined?it.n:it);
    }
    b.dataset.key=key;b.dataset.idx=i;
    b.onclick=()=>pick(key,i);
    el.appendChild(b);
  });
}

function refreshActive(){
  const st=chars[curChar];
  document.querySelectorAll('[data-key]').forEach(b=>{
    const k=b.dataset.key;const i=parseInt(b.dataset.idx);
    const on=st[k]===i;
    if(b.classList.contains('swatch')){
      b.classList.toggle('on',on);
    } else {
      b.classList.toggle('on',on);
    }
  });
}

let curTab='hahmo';
function setTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const tabs=['hahmo','hiukset','vaatteet','paahine','lisaosa','varit'];
    b.classList.toggle('on',tabs[i]===t);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p_'+t).classList.add('on');
}

function selectChar(c){
  curChar=c;
  document.getElementById('wrapA').classList.toggle('selected',c==='A');
  document.getElementById('wrapB').classList.toggle('selected',c==='B');
  document.getElementById('selLabel').textContent= c==='A'?'⭐ Muokkaat Almaa':'💜 Muokkaat Elsaa';
  refreshActive();
}

function pick(key,i){
  chars[curChar][key]=i;
  buildSVG('doll'+curChar,chars[curChar]);
  refreshActive();
}

function renderAll(){
  buildSVG('dollA',chars.A);
  buildSVG('dollB',chars.B);
}

function rnd(a){return Math.floor(Math.random()*a.length);}
function surprise(){
  const st=chars[curChar];
  const wd=WORLDS[curWorld];
  st.type=rnd(TYPES);st.expr=rnd(EXPR);st.skin=rnd(SKIN);st.eye=rnd(EYEC);
  st.hair=rnd(HAIRS);st.hairc=rnd(HAIRC);
  st.outfit=wd.outfits[Math.random()<0.5?0:1]||rnd(OUTFITS);
  st.outc=rnd(OUTFC);st.head=wd.heads[Math.random()<0.5?0:1]||rnd(HEADS);
  st.extra=wd.extras[Math.random()<0.5?0:1]||rnd(EXTRAS);
  buildSVG('doll'+curChar,st);
  refreshActive();
}
</script>
</body>
</html>
