<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma ja Elsa seikkailee!</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0015;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;}

/* ── TITLE ── */
#titleScreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a0040,#0a0015);}
.t-title{font-size:clamp(26px,6vw,52px);font-weight:900;color:#FFD93B;text-shadow:0 0 30px #FF6FA4,0 0 60px #7C6BF0;text-align:center;animation:glow 2s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 20px #FF6FA4;}to{text-shadow:0 0 50px #FF6FA4,0 0 90px #FFD93B;}}
.t-sub{color:#C8A2F0;font-size:16px;margin:10px 0 32px;text-align:center;}
.world-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;max-width:760px;width:90%;padding:0 12px;}
.wbtn{padding:16px 8px;border-radius:16px;border:2px solid rgba(255,255,255,0.15);cursor:pointer;font-size:14px;font-weight:700;color:#fff;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.18s;backdrop-filter:blur(4px);}
.wbtn:hover{transform:scale(1.08);border-color:#FFD93B;box-shadow:0 0 18px #FFD93B55;}
.wbtn span{font-size:32px;}
.wbtn.space{background:linear-gradient(135deg,#0d0d2b,#1a1a5e);}
.wbtn.ocean{background:linear-gradient(135deg,#003366,#0077aa);}
.wbtn.jungle{background:linear-gradient(135deg,#0d2b0d,#1a6020);}
.wbtn.ice{background:linear-gradient(135deg,#0d2b40,#5599cc);}
.wbtn.fairy{background:linear-gradient(135deg,#2d0d3d,#8B3DB8);}
.wbtn.mushroom{background:linear-gradient(135deg,#2b0d0d,#cc3333);}
.wbtn.future{background:linear-gradient(135deg,#0d1a2b,#00aacc);}
.wbtn.circus{background:linear-gradient(135deg,#2b0000,#cc2200);}

/* ── DRESS UP ── */
#dressScreen{position:fixed;inset:0;z-index:150;display:none;flex-direction:column;align-items:center;overflow-y:auto;}
.dress-bg{position:fixed;inset:0;z-index:-1;transition:background 0.5s;}
.dress-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:860px;padding:10px 16px;margin-top:8px;}
.dress-world-name{font-size:18px;font-weight:800;color:#FFD93B;text-shadow:0 0 10px currentColor;}
.back-btn{padding:7px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(0,0,0,0.4);color:#fff;font-size:13px;cursor:pointer;}
.back-btn:hover{border-color:#FFD93B;}
.dress-stage{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;padding:6px 16px;}
.char-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.char-lbl{font-size:13px;font-weight:700;color:#FFD93B;}
.doll-frame{background:rgba(255,255,255,0.07);border-radius:18px;padding:5px;border:2px solid rgba(255,255,255,0.12);cursor:pointer;transition:all 0.18s;}
.doll-frame:hover,.doll-frame.sel{border-color:#FF6FA4;box-shadow:0 0 20px #FF6FA455;}
.dress-controls{width:100%;max-width:860px;background:rgba(0,0,0,0.6);border-radius:18px;padding:12px 14px;border:1.5px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);margin:8px 16px;}
.sel-lbl{font-size:12px;color:#C8A2F0;text-align:center;margin-bottom:8px;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tab{padding:6px 12px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#aaa;font-size:12px;cursor:pointer;transition:all 0.15s;}
.tab.on{background:#7C6BF0;border-color:#9B8BFF;color:#fff;}
.panel{display:none;}.panel.on{display:block;}
.rlbl{font-size:11px;font-weight:700;color:#C8A2F0;margin:6px 0 4px;text-transform:uppercase;letter-spacing:.4px;}
.opts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px;}
.opt{padding:6px 11px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);font-size:12px;cursor:pointer;color:#ddd;transition:all 0.13s;}
.opt:hover{background:rgba(255,255,255,0.12);border-color:#7C6BF0;}
.opt.on{background:#7C6BF0;border-color:#9B8BFF;color:#fff;}
.sw{width:29px;height:29px;border-radius:50%;border:2px solid rgba(255,255,255,0.18);cursor:pointer;transition:all 0.13s;}
.sw:hover{transform:scale(1.18);border-color:#fff;}
.sw.on{border:3px solid #FFD93B;box-shadow:0 0 9px #FFD93B88;transform:scale(1.1);}
.dress-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.go-btn{flex:2;min-width:160px;padding:13px;border:none;border-radius:13px;background:linear-gradient(90deg,#56D45B,#34C3A6);color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:opacity .15s;}
.go-btn:hover{opacity:.85;}
.surp-btn{flex:1;min-width:120px;padding:13px;border:none;border-radius:13px;background:linear-gradient(90deg,#FF6FA4,#7C6BF0);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.surp-btn:hover{opacity:.85;}

/* ── ADVENTURE ── */
#advScreen{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;}
#gameCanvas{display:block;width:100%;height:100%;}
.hud{position:fixed;top:10px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;pointer-events:none;z-index:120;}
.hud-score{background:rgba(0,0,0,0.5);color:#FFD93B;font-size:16px;font-weight:800;padding:6px 14px;border-radius:12px;border:1.5px solid rgba(255,217,59,0.3);}
.hud-stars{color:#FFD93B;font-size:18px;}
.hud-btns{display:flex;gap:8px;pointer-events:all;}
.hud-btn{padding:6px 13px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:13px;cursor:pointer;transition:all .15s;}
.hud-btn:hover{border-color:#FFD93B;background:rgba(255,217,59,.15);}

/* mobile controls */
.mobile-controls{position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;z-index:120;pointer-events:none;}
.mc-left{display:flex;gap:8px;}
.mc-btn{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);color:#fff;font-size:22px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;-webkit-tap-highlight-color:transparent;}
.mc-btn:active{background:rgba(255,217,59,.35);border-color:#FFD93B;transform:scale(.93);}
</style>
</head>
<body>

<!-- TITLE -->
<div id="titleScreen">
  <div class="t-title">🌟 Alma ja Elsa<br>seikkailee! 🌟</div>
  <div class="t-sub">Valitse maailma!</div>
  <div class="world-grid">
    <button class="wbtn space" onclick="chooseWorld('space')"><span>🚀</span>Avaruus</button>
    <button class="wbtn ocean" onclick="chooseWorld('ocean')"><span>🌊</span>Merenpohja</button>
    <button class="wbtn jungle" onclick="chooseWorld('jungle')"><span>🌴</span>Viidakko</button>
    <button class="wbtn ice" onclick="chooseWorld('ice')"><span>❄️</span>Jäämaailma</button>
    <button class="wbtn fairy" onclick="chooseWorld('fairy')"><span>🧚</span>Satumaailma</button>
    <button class="wbtn mushroom" onclick="chooseWorld('mushroom')"><span>🍄</span>Sienimaailma</button>
    <button class="wbtn future" onclick="chooseWorld('future')"><span>🤖</span>Tulevaisuus</button>
    <button class="wbtn circus" onclick="chooseWorld('circus')"><span>🎪</span>Sirkus</button>
  </div>
</div>

<!-- DRESS UP -->
<div id="dressScreen">
  <div class="dress-bg" id="dressBg"></div>
  <div class="dress-header">
    <div class="dress-world-name" id="dressWorldName"></div>
    <button class="back-btn" onclick="showTitle()">← Takaisin</button>
  </div>
  <div class="dress-stage">
    <div class="char-col">
      <div class="char-lbl">⭐ Alma</div>
      <div class="doll-frame sel" id="frameA" onclick="selChar('A')">
        <svg id="dollA" viewBox="0 0 280 360" width="150"></svg>
      </div>
    </div>
    <div class="char-col">
      <div class="char-lbl">💜 Elsa</div>
      <div class="doll-frame" id="frameB" onclick="selChar('B')">
        <svg id="dollB" viewBox="0 0 280 360" width="150"></svg>
      </div>
    </div>
  </div>
  <div class="dress-controls">
    <div class="sel-lbl" id="selLbl">Muokkaat ⭐ Almaa — klikkaa hahmoa vaihtaaksesi</div>
    <div class="tabs">
      <button class="tab on" onclick="setTab('hahmo')">Hahmo</button>
      <button class="tab" onclick="setTab('hiukset')">Hiukset</button>
      <button class="tab" onclick="setTab('vaatteet')">Vaatteet</button>
      <button class="tab" onclick="setTab('lisaosa')">Lisäosa</button>
      <button class="tab" onclick="setTab('varit')">Värit</button>
    </div>
    <div id="p_hahmo" class="panel on">
      <div class="rlbl">Hahmotyyppi</div><div class="opts" id="b_type"></div>
      <div class="rlbl">Ilme</div><div class="opts" id="b_expr"></div>
      <div class="rlbl">Ihonväri</div><div class="opts" id="b_skin"></div>
    </div>
    <div id="p_hiukset" class="panel">
      <div class="rlbl">Hiusmalli</div><div class="opts" id="b_hair"></div>
      <div class="rlbl">Hiusten väri</div><div class="opts" id="b_hairc"></div>
    </div>
    <div id="p_vaatteet" class="panel">
      <div class="rlbl">Asu</div><div class="opts" id="b_outfit"></div>
      <div class="rlbl">Väri</div><div class="opts" id="b_outc"></div>
    </div>
    <div id="p_lisaosa" class="panel">
      <div class="rlbl">Päähine</div><div class="opts" id="b_head"></div>
      <div class="rlbl">Lisäosa</div><div class="opts" id="b_extra"></div>
    </div>
    <div id="p_varit" class="panel">
      <div class="rlbl">Vaatteen väri</div><div class="opts" id="b_outc2"></div>
      <div class="rlbl">Hiusten väri</div><div class="opts" id="b_hairc2"></div>
      <div class="rlbl">Ihonväri</div><div class="opts" id="b_skin2"></div>
    </div>
    <div class="dress-btns">
      <button class="surp-btn" onclick="surprise()">🎲 Yllätä!</button>
      <button class="go-btn" onclick="startAdventure()">🌍 Seikkaile! →</button>
    </div>
  </div>
</div>

<!-- ADVENTURE -->
<div id="advScreen">
  <canvas id="gameCanvas"></canvas>
  <div class="hud">
    <div class="hud-score">⭐ <span id="scoreEl">0</span></div>
    <div class="hud-btns">
      <button class="hud-btn" onclick="showDress()">👗 Pukuhuone</button>
      <button class="hud-btn" onclick="showTitle()">🌍 Maailmat</button>
    </div>
  </div>
  <div class="mobile-controls">
    <div class="mc-left">
      <button class="mc-btn" id="btnLeft" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</button>
      <button class="mc-btn" id="btnRight" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</button>
    </div>
    <button class="mc-btn" id="btnJump" ontouchstart="doJump()" ontouchend="">🔼</button>
  </div>
</div>

<script>
// ══ DATA ══════════════════════════════════════════════════════════════════
const SKIN=['#FFE9D6','#FFE0BD','#F1C27D','#C68642','#8D5524','#B8E994','#C8A2F0','#9BD3FF','#FF9FB2'];
const HAIRC=['#1a0e08','#9B5A1E','#F0C84B','#E2574C','#7C5CD6','#F07CC4','#F2F2F2','#5BC0EB','#56D45B','#FF8C42'];
const OUTFC=['#FF6FA4','#7C6BF0','#34C3A6','#FFC93C','#5BA8F5','#FF8C42','#E84393','#56D45B','#FF4D6D','#fff','#FFD93B'];
const TYPES=['Ihminen','Kissa 🐱','Pupu 🐰','Karhu 🐻','Kettu 🦊','Lohikäärme 🐉','Prinsessa 👸','Supersankari 🦸','Merenneito 🧜','Robotti 🤖','Yksisarvinen 🦄','Keiju 🧚'];
const EXPRS=['Iloinen','Nauru','Yllättynyt','Tyyni','Siisti 😎'];
const HAIRS=['Pitkät','Polkka','Letit','Kiharat','Ei hiuksia','Nuttura','Aallot','Piikit'];
const OUTFITS=['Mekko','T-paita','Tutu','Viitta','Sirkusasu','Tähtimekko','Haalari','Prinsessamekko','Haarniska','Astronauttiasu'];
const HEADS=['Ei mitään','Kruunu 👑','Jesterihattu','Silinteri','Tähtipanta','Kukka 🌸','Rusetti','Lippis','Noitahattu','Sarvit'];
const EXTRAS=['Ei mitään','Siivet 🪽','Taikasauva','Kaulakoru','Huivi','Lasit','Miekka','Kilpi','Häntä','Tridentti'];

const WORLDS={
  space:{name:'🚀 Avaruus',sky:['#000015','#0a0035'],ground:'#1a1060',platforms:'#2a2080',collect:'⭐',enemy:'👾',bg:['🌟','⭐','🪐','🌙','☄️'],groundColor:'#1a1060',platColor:'#2a2080',collectColor:'#FFD93B',skyTop:'#000015',skyBot:'#0d0040'},
  ocean:{name:'🌊 Merenpohja',sky:['#001133','#003366'],ground:'#003355',platforms:'#005588',collect:'🐚',enemy:'🦑',bg:['🐠','🐟','🫧','🌊','🦀'],groundColor:'#004466',platColor:'#006699',collectColor:'#FFD93B',skyTop:'#001133',skyBot:'#003388'},
  jungle:{name:'🌴 Viidakko',sky:['#021a02','#0a3d0a'],ground:'#0d3d0d',platforms:'#1a5c1a',collect:'🍌',enemy:'🐍',bg:['🌴','🦋','🌺','🌿','🦜'],groundColor:'#0d3d0d',platColor:'#1a6020',collectColor:'#FFD93B',skyTop:'#021a02',skyBot:'#0a4010'},
  ice:{name:'❄️ Jäämaailma',sky:['#0a1a2b','#1a4466'],ground:'#a0c8e0',platforms:'#7ab0cc',collect:'💎',enemy:'🐧',bg:['❄️','⛄','🌨️','🏔️','🦢'],groundColor:'#8ab8d0',platColor:'#6a98b8',collectColor:'#FFD93B',skyTop:'#0a1a2b',skyBot:'#2255aa'},
  fairy:{name:'🧚 Satumaailma',sky:['#1a0030','#4a0088'],ground:'#6a20a0',platforms:'#8a3ac0',collect:'🌸',enemy:'🐉',bg:['🧚','🌈','🦄','🌸','💜'],groundColor:'#5a1a90',platColor:'#7a2aaa',collectColor:'#FFD93B',skyTop:'#1a0030',skyBot:'#4a0080'},
  mushroom:{name:'🍄 Sienimaailma',sky:['#1a0000','#440000'],ground:'#8B0000',platforms:'#cc2200',collect:'🍄',enemy:'🐛',bg:['🍄','🌿','🐞','🦋','💊'],groundColor:'#6B0000',platColor:'#aa2200',collectColor:'#FFD93B',skyTop:'#220000',skyBot:'#550000'},
  future:{name:'🤖 Tulevaisuus',sky:['#000810','#001525'],ground:'#0a2040',platforms:'#0a3060',collect:'⚡',enemy:'🤖',bg:['💻','⚙️','🔮','📡','⚡'],groundColor:'#0a2040',platColor:'#0a3a60',collectColor:'#FFD93B',skyTop:'#000810',skyBot:'#001a30'},
  circus:{name:'🎪 Sirkus',sky:['#1a0000','#3a0000'],ground:'#8B1a00',platforms:'#cc3300',collect:'🎈',enemy:'🤹',bg:['🎪','🎭','🎠','🎡','🎯'],groundColor:'#6B1000',platColor:'#aa2200',collectColor:'#FFD93B',skyTop:'#1a0000',skyBot:'#3a0a00'},
};

// ══ STATE ══════════════════════════════════════════════════════════════════
let curWorld='space';
let curChar='A';
const chars={
  A:{type:0,expr:0,skin:1,hair:0,hairc:3,outfit:0,outc:0,head:0,extra:0},
  B:{type:0,expr:0,skin:2,hair:2,hairc:7,outfit:0,outc:1,head:0,extra:0},
};

// ══ SCREEN MANAGEMENT ═════════════════════════════════════════════════════
function showTitle(){
  stopGame();
  document.getElementById('titleScreen').style.display='flex';
  document.getElementById('dressScreen').style.display='none';
  document.getElementById('advScreen').style.display='none';
}
function chooseWorld(w){
  curWorld=w;
  const wd=WORLDS[w];
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('dressScreen').style.display='flex';
  document.getElementById('advScreen').style.display='none';
  document.getElementById('dressBg').style.background=`linear-gradient(180deg,${wd.skyTop},${wd.skyBot})`;
  document.getElementById('dressWorldName').textContent=wd.name;
  buildControls();
  renderDolls();
  selChar('A');
}
function showDress(){
  stopGame();
  document.getElementById('dressScreen').style.display='flex';
  document.getElementById('advScreen').style.display='none';
}
function startAdventure(){
  document.getElementById('dressScreen').style.display='none';
  document.getElementById('advScreen').style.display='flex';
  initGame();
}

// ══ DRESS UP ══════════════════════════════════════════════════════════════
function selChar(c){
  curChar=c;
  document.getElementById('frameA').classList.toggle('sel',c==='A');
  document.getElementById('frameB').classList.toggle('sel',c==='B');
  document.getElementById('selLbl').textContent=c==='A'?'Muokkaat ⭐ Almaa — klikkaa hahmoa vaihtaaksesi':'Muokkaat 💜 Elsaa — klikkaa hahmoa vaihtaaksesi';
  refreshBtns();
}
function setTab(t){
  const tabs=['hahmo','hiukset','vaatteet','lisaosa','varit'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',tabs[i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p_'+t).classList.add('on');
}
function buildControls(){
  mkBtns('b_type',TYPES,'type',false);mkBtns('b_expr',EXPRS,'expr',false);
  mkBtns('b_skin',SKIN,'skin',true);mkBtns('b_hair',HAIRS,'hair',false);
  mkBtns('b_hairc',HAIRC,'hairc',true);mkBtns('b_outfit',OUTFITS,'outfit',false);
  mkBtns('b_outc',OUTFC,'outc',true);mkBtns('b_outc2',OUTFC,'outc',true);
  mkBtns('b_hairc2',HAIRC,'hairc',true);mkBtns('b_skin2',SKIN,'skin',true);
  mkBtns('b_head',HEADS,'head',false);mkBtns('b_extra',EXTRAS,'extra',false);
}
function mkBtns(id,arr,key,colors){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  arr.forEach((it,i)=>{
    const b=document.createElement('button');
    if(colors){b.className='sw';b.style.background=it;b.title=it;}
    else{b.className='opt';b.textContent=it.n||it;}
    b.dataset.key=key;b.dataset.idx=i;
    b.onclick=()=>pick(key,i);
    el.appendChild(b);
  });
}
function pick(key,i){chars[curChar][key]=parseInt(i);renderDolls();refreshBtns();}
function refreshBtns(){
  const st=chars[curChar];
  document.querySelectorAll('[data-key]').forEach(b=>{
    b.classList.toggle('on',st[b.dataset.key]===parseInt(b.dataset.idx));
  });
}
function rnd(a){return Math.floor(Math.random()*a.length);}
function surprise(){
  const st=chars[curChar];
  st.type=rnd(TYPES);st.expr=rnd(EXPRS);st.skin=rnd(SKIN);
  st.hair=rnd(HAIRS);st.hairc=rnd(HAIRC);st.outfit=rnd(OUTFITS);
  st.outc=rnd(OUTFC);st.head=rnd(HEADS);st.extra=rnd(EXTRAS);
  renderDolls();refreshBtns();
}
function renderDolls(){buildDoll('dollA',chars.A);buildDoll('dollB',chars.B);}

// ══ SVG DOLL ══════════════════════════════════════════════════════════════
function buildDoll(id,st){
  const svg=document.getElementById(id);if(!svg)return;
  const s=SKIN[st.skin],h=HAIRC[st.hairc],o=OUTFC[st.outc],e=['#6B4A2E','#2E6B4A','#2E4A6B','#8B2E2E','#4A2E8B','#00ccff','#FF88CC'][st.type%7];
  let x='';
  // extra wings behind
  if(st.extra===1)x+=`<path d="M72 168 Q30 140 18 196 Q48 204 72 184Z" fill="#EAD9FF" stroke="#C9A8FF" stroke-width="2"/><path d="M72 188 Q28 204 22 244 Q54 236 74 212Z" fill="#FBE3F1" stroke="#F0B6D6" stroke-width="2"/><path d="M208 168 Q250 140 262 196 Q232 204 208 184Z" fill="#EAD9FF" stroke="#C9A8FF" stroke-width="2"/><path d="M208 188 Q252 204 258 244 Q226 236 206 212Z" fill="#FBE3F1" stroke="#F0B6D6" stroke-width="2"/>`;
  // legs+shoes
  x+=`<rect x="112" y="248" width="18" height="64" rx="9" fill="${s}"/><rect x="150" y="248" width="18" height="64" rx="9" fill="${s}"/><ellipse cx="121" cy="314" rx="18" ry="11" fill="#3a2a4a"/><ellipse cx="159" cy="314" rx="18" ry="11" fill="#3a2a4a"/>`;
  // arms
  x+=`<rect x="66" y="172" width="17" height="65" rx="8.5" fill="${s}"/><rect x="197" y="172" width="17" height="65" rx="8.5" fill="${s}"/><circle cx="74" cy="240" r="11" fill="${s}"/><circle cx="205" cy="240" r="11" fill="${s}"/>`;
  // outfit
  x+=dollOutfit(st.outfit,o,s);

// ══ GAME ENGINE ═══════════════════════════════════════════════════════════
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H,raf,gameRunning=false;
let score=0;
let camX=0;
const keys={left:false,right:false,up:false};
let players=[];
let platforms=[];
let collectibles=[];
let enemies=[];
let worldDecorations=[];
let particles=[];

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',()=>{resize();if(gameRunning)buildLevel();});

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if((e.key==='ArrowUp'||e.key==='w'||e.key===' ')&&gameRunning)doJump();
  e.preventDefault();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
});

function doJump(){
  players.forEach(p=>{if(p.onGround){p.vy=-16;p.onGround=false;}});
}

function initGame(){
  resize();
  score=0;
  document.getElementById('scoreEl').textContent='0';
  gameRunning=true;
  buildLevel();
  buildPlayerSprites();
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function stopGame(){
  gameRunning=false;
  if(raf)cancelAnimationFrame(raf);
}

function buildPlayerSprites(){
  // offscreen canvases for characters
  players=[
    makePlayer(200,100,chars.A,'A'),
    makePlayer(280,100,chars.B,'B'),
  ];
}

function makePlayer(x,y,st,id){
  const oc=document.createElement('canvas');
  oc.width=80;oc.height=120;
  const s=buildPlayerCanvas(oc,st);
  return {x,y,vx:0,vy:0,w:50,h:90,onGround:false,canvas:oc,id,st,facing:1,trail:[]};
}

function buildPlayerCanvas(oc,st){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 280 360');
  svg.setAttribute('width','80');svg.setAttribute('height','120');
  const s=SKIN[st.skin],h=HAIRC[st.hairc],o=OUTFC[st.outc];
  const e=['#6B4A2E','#2E6B4A','#2E4A6B','#8B2E2E','#4A2E8B','#00ccff','#FF88CC'][st.type%7];
  let x='';
  x+=`<rect x="112" y="248" width="18" height="64" rx="9" fill="${s}"/><rect x="150" y="248" width="18" height="64" rx="9" fill="${s}"/><ellipse cx="121" cy="314" rx="18" ry="11" fill="#3a2a4a"/><ellipse cx="159" cy="314" rx="18" ry="11" fill="#3a2a4a"/>`;
  x+=`<rect x="66" y="172" width="17" height="65" rx="8.5" fill="${s}"/><rect x="197" y="172" width="17" height="65" rx="8.5" fill="${s}"/>`;
  x+=dollOutfit(st.outfit,o,s);
  x+=`<rect x="127" y="138" width="22" height="28" rx="10" fill="${s}"/>`;
  x+=`<circle cx="140" cy="110" r="54" fill="${s}"/>`;
  x+=dollHairB(st.hair,h);
  x+=dollFace(st.expr,e,s,h);
  x+=dollHairF(st.hair,h);
  x+=dollType(st.type,s);
  x+=dollHead(st.head,o);
  svg.innerHTML=x;
  const blob=new Blob([svg.outerHTML],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{const c2=oc.getContext('2d');c2.clearRect(0,0,80,120);c2.drawImage(img,0,0,80,120);URL.revokeObjectURL(url);};
  img.src=url;
  return oc;
}

const LEVEL_WIDTH=6000;
function buildLevel(){
  const wd=WORLDS[curWorld];
  platforms=[];collectibles=[];enemies=[];worldDecorations=[];camX=0;
  const gh=60;// ground height
  // ground
  platforms.push({x:0,y:H-gh,w:LEVEL_WIDTH,h:gh,color:wd.groundColor,isGround:true});
  // platforms
  const pColors=[wd.platColor];
  let px=400;
  while(px<LEVEL_WIDTH-200){
    const pw=80+Math.random()*160;
    const py=H-gh-100-Math.random()*280;
    platforms.push({x:px,y:py,w:pw,h:20,color:pColors[0],isGround:false});
    // collectible on platform
    if(Math.random()>0.3){
      collectibles.push({x:px+pw/2-14,y:py-40,w:28,h:28,emoji:wd.collect,collected:false,bob:Math.random()*Math.PI*2});
    }
    px+=pw+60+Math.random()*180;
  }
  // some collectibles on ground level
  for(let i=0;i<20;i++){
    collectibles.push({x:200+i*280+Math.random()*100,y:H-gh-44,w:28,h:28,emoji:wd.collect,collected:false,bob:Math.random()*Math.PI*2});
  }
  // enemies — simple patrol
  for(let i=0;i<18;i++){
    enemies.push({x:300+i*320+Math.random()*100,y:H-gh-46,w:36,h:36,emoji:wd.enemy,dir:1,speed:1.2+Math.random()*1.2,startX:300+i*320,patrol:140+Math.random()*120});
  }
  // bg decorations
  wd.bg.forEach((em,i)=>{
    for(let j=0;j<20;j++){
      worldDecorations.push({emoji:em,x:100+Math.random()*(LEVEL_WIDTH-200),y:40+Math.random()*(H*0.6),size:18+Math.random()*30,speed:0.15+Math.random()*0.25,alpha:0.25+Math.random()*0.35});
    }
  });
}

function loop(){
  if(!gameRunning)return;
  update();
  draw();
  raf=requestAnimationFrame(loop);
}

function update(){
  const wd=WORLDS[curWorld];
  const spd=4.5;
  const lead=players[0];// camera follows first player

  players.forEach(p=>{
    if(keys.left){p.vx=-spd;p.facing=-1;}
    else if(keys.right){p.vx=spd;p.facing=1;}
    else{p.vx*=0.78;}
    p.vy+=0.7;// gravity
    p.x+=p.vx;p.y+=p.vy;
    p.onGround=false;
    // platform collision
    platforms.forEach(pl=>{
      if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+p.vy+2&&p.vy>=0){
        p.y=pl.y-p.h;p.vy=0;p.onGround=true;
      }
    });
    // bounds
    if(p.x<0)p.x=0;
    if(p.x>LEVEL_WIDTH-p.w)p.x=LEVEL_WIDTH-p.w;
    if(p.y>H+100){p.y=100;p.vy=0;}// fell off — respawn
    // trail
    p.trail.push({x:p.x+p.w/2,y:p.y+p.h/2,a:0.5});
    if(p.trail.length>8)p.trail.shift();
    p.trail.forEach(t=>t.a-=0.06);
    // collect
    collectibles.forEach(c=>{
      if(!c.collected&&p.x<c.x+c.w&&p.x+p.w>c.x&&p.y<c.y+c.h&&p.y+p.h>c.y){
        c.collected=true;score++;
        document.getElementById('scoreEl').textContent=score;
        for(let i=0;i<8;i++)particles.push({x:c.x+14,y:c.y+14,vx:(Math.random()-0.5)*5,vy:-Math.random()*5-2,life:1,color:wd.collectColor});
      }
    });
    // enemy hit
    enemies.forEach(en=>{
      if(p.x<en.x+en.w&&p.x+p.w>en.x&&p.y<en.y+en.h&&p.y+p.h>en.y){
        if(p.vy>1&&p.y+p.h<en.y+en.h*0.5+10){
          // stomp!
          en.dead=true;p.vy=-10;score+=3;
          document.getElementById('scoreEl').textContent=score;
          for(let i=0;i<12;i++)particles.push({x:en.x+18,y:en.y,vx:(Math.random()-0.5)*6,vy:-Math.random()*6-2,life:1,color:'#FFD93B'});
        } else {
          // bounce back
          p.vx=-p.vx*2;p.vy=-8;
        }
      }
    });
    enemies=enemies.filter(e=>!e.dead);
  });

  // camera
  const target=lead.x-W/2+lead.w/2;
  camX+=(target-camX)*0.1;
  camX=Math.max(0,Math.min(LEVEL_WIDTH-W,camX));

  // enemies patrol
  enemies.forEach(en=>{
    en.x+=en.dir*en.speed;
    if(en.x>en.startX+en.patrol||en.x<en.startX)en.dir*=-1;
  });
  // collectible bob
  collectibles.forEach(c=>{c.bob+=0.05;});
  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.04;});
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  const wd=WORLDS[curWorld];
  ctx.clearRect(0,0,W,H);
  // sky gradient
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,wd.skyTop);grd.addColorStop(1,wd.skyBot);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.translate(-camX,0);

  // bg decorations (parallax)
  worldDecorations.forEach(d=>{
    ctx.globalAlpha=d.alpha;
    ctx.font=`${d.size}px serif`;
    ctx.fillText(d.emoji,d.x-camX*d.speed+camX,d.y);
  });
  ctx.globalAlpha=1;

  // platforms
  platforms.forEach(p=>{
    ctx.fillStyle=p.color;
    if(p.isGround){
      ctx.fillRect(p.x,p.y,p.w,p.h);
      // ground detail
      ctx.fillStyle='rgba(255,255,255,0.07)';
      ctx.fillRect(p.x,p.y,p.w,6);
    } else {
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,10);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,6,10);ctx.fill();
    }
  });

  // collectibles
  collectibles.forEach(c=>{
    if(c.collected)return;
    ctx.font='26px serif';
    ctx.fillText(c.emoji,c.x,c.y+Math.sin(c.bob)*5);
    // glow
    ctx.shadowColor=WORLDS[curWorld].collectColor;
    ctx.shadowBlur=14;
    ctx.font='26px serif';
    ctx.fillText(c.emoji,c.x,c.y+Math.sin(c.bob)*5);
    ctx.shadowBlur=0;
  });

  // enemies
  enemies.forEach(en=>{
    ctx.font='32px serif';
    ctx.save();
    if(en.dir<0){ctx.translate(en.x+18,en.y+18);ctx.scale(-1,1);ctx.fillText(en.emoji,-18,-18);}
    else{ctx.fillText(en.emoji,en.x,en.y+28);}
    ctx.restore();
  });

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,5*p.life,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // players
  players.forEach(p=>{
    // trail
    p.trail.forEach(t=>{
      if(t.a>0){ctx.globalAlpha=Math.max(0,t.a);ctx.fillStyle='rgba(255,217,59,0.4)';ctx.beginPath();ctx.arc(t.x,t.y,10,0,Math.PI*2);ctx.fill();}
    });
    ctx.globalAlpha=1;
    // character
    ctx.save();
    const cx2=p.x+p.w/2;
    ctx.translate(cx2,p.y);
    if(p.facing<0){ctx.scale(-1,1);ctx.translate(-p.w,0);}else{ctx.translate(-p.w/2,0);}
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(p.w/2,p.h+4,p.w*0.4,8,0,0,Math.PI*2);ctx.fill();
    // draw doll canvas
    if(p.canvas)ctx.drawImage(p.canvas,0,0,p.w,p.h);
    ctx.restore();
    // name label
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(p.x-8,p.y-26,p.w+16,20,8);ctx.fill();
    ctx.fillStyle='#FFD93B';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.id==='A'?'⭐ Alma':'💜 Elsa',p.x+p.w/2,p.y-10);
    ctx.textAlign='left';
  });

  ctx.restore();

  // finish flag
  ctx.font='40px serif';
  ctx.fillText('🏁',LEVEL_WIDTH-camX-60,H-80);
}

showTitle();
</script>
