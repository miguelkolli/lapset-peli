<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a0a2e; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 16px; }
  h1 { color: #FFD93B; font-size: 28px; text-align: center; margin: 12px 0 4px; text-shadow: 0 0 20px #FF6FA4; letter-spacing: 1px; }
  .sub { color: #C8A2F0; font-size: 14px; text-align: center; margin-bottom: 14px; }
  .game { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; width: 100%; max-width: 900px; }
  .doll-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .doll-wrap { background: linear-gradient(135deg,#2d1b4e,#1a0f3a); border-radius: 24px; padding: 8px; border: 2px solid #7C6BF0; box-shadow: 0 0 30px #7C6BF044; }
  .controls { background: #120827; border-radius: 20px; padding: 14px; border: 1.5px solid #3a2060; width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 12px; max-height: 80vh; overflow-y: auto; }
  .controls::-webkit-scrollbar { width: 6px; } .controls::-webkit-scrollbar-thumb { background: #7C6BF0; border-radius: 3px; }
  .row-label { font-size: 12px; font-weight: 600; color: #C8A2F0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .btns { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn { padding: 7px 13px; border-radius: 10px; border: 1.5px solid #3a2060; background: #1e0f3a; font-size: 13px; cursor: pointer; color: #ddd; transition: all 0.15s; }
  .btn:hover { background: #2d1b4e; border-color: #7C6BF0; color: #fff; }
  .btn.on { background: #7C6BF0; border-color: #9B8BFF; color: #fff; box-shadow: 0 0 10px #7C6BF066; }
  .swatch { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #3a2060; cursor: pointer; transition: all 0.15s; }
  .swatch:hover { transform: scale(1.15); border-color: #fff; }
  .swatch.on { border: 3px solid #FFD93B; box-shadow: 0 0 10px #FFD93B88; transform: scale(1.1); }
  .surprise { width: 100%; padding: 12px; border: none; border-radius: 14px; background: linear-gradient(90deg,#FF6FA4,#7C6BF0); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.15s; margin-top: 4px; }
  .surprise:hover { opacity: 0.88; }
  .save-btn { width: 100%; padding: 11px; border: 2px solid #FFD93B; border-radius: 14px; background: transparent; color: #FFD93B; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .save-btn:hover { background: #FFD93B22; }
  @media (max-width: 600px) { .game { flex-direction: column; align-items: center; } }
</style>

        <g id="x_sword" class="ex" style="display:none"><rect x="258" y="260" width="8" height="100" rx="4" fill="#C0C0C0"/><rect x="244" y="310" width="36" height="8" rx="4" fill="#8B6914"/><circle cx="262" cy="260" r="7" fill="#FFD93B" stroke="#E8B400" stroke-width="2"/></g>
        <g id="x_guitar" class="ex" style="display:none"><ellipse cx="115" cy="330" rx="24" ry="28" fill="#8B4513"/><ellipse cx="115" cy="330" rx="10" ry="12" fill="#000" opacity="0.4"/><rect x="111" y="250" width="8" height="90" rx="4" fill="#8B4513"/><rect x="100" y="248" width="30" height="14" rx="4" fill="#6B3410"/><line x1="109" y1="258" x2="109" y2="355" stroke="#fff" stroke-width="1.5" opacity="0.6"/><line x1="115" y1="258" x2="115" y2="355" stroke="#fff" stroke-width="1.5" opacity="0.6"/><line x1="121" y1="258" x2="121" y2="355" stroke="#fff" stroke-width="1.5" opacity="0.6"/></g>
      </svg>
    </div>
    <button class="surprise" onclick="surprise()">🎲 Yllätä minut!</button>
  </div>

  <div class="controls" id="panel"></div>
</div>

<script>
const SKIN=['#FFE9D6','#FFE0BD','#FFD1B0','#F7D7C4','#F1C27D','#E8B173','#E0AC69','#D9A066','#C68642','#A56635','#8D5524','#6B4226','#4A2F1B','#B8E994','#C8A2F0','#9BD3FF','#FF9FB2','#FF6B6B'];
const HAIR=['#1a0e08','#3A2A1A','#9B5A1E','#F0C84B','#E2574C','#7C5CD6','#F07CC4','#F2F2F2','#5BC0EB','#56D45B','#FF8C42','#FF4FB3'];
const OUTFIT=['#FF6FA4','#7C6BF0','#34C3A6','#FFC93C','#5BA8F5','#FF8C42','#E84393','#56D45B','#FF4D6D','#9B6BF0','#E84242','#34A8C3'];
const BG=[{c:'#2B1B4E'},{c:'#0a2040'},{c:'#0d2d16'},{c:'#2d1a00'},{c:'#FFE3F1'},{c:'#E3F0FF'},{c:'#FFF6D6'},{c:'#1a1a2e',p:'star'},{c:'#ffffff',p:'rainbow'}];
const TYPES=['Ihminen','Kissa','Pupu','Karhu','Kettu','Lohikäärme','Klovni'];
const EXPR=['Iloinen','Nauru','Yllättynyt','Tyyni'];
const HAIRSTYLES=['Pitkät','Polkka','Letit','Kiharat','Ei hiuksia','Nuttura','Aallot','Piikit','Kaksoistumput'];
const OUTFITS=['Mekko','T-paita','Tutu','Viitta','Sirkusasu','Tähtimekko','Haalari','Bleiseri'];
const HEAD=[{n:'Ei mitään',el:'h_none'},{n:'Kruunu',el:'h_crown'},{n:'Jesterihattu',el:'h_jester'},{n:'Silinteri',el:'h_top'},{n:'Tähtipanta',el:'h_band'},{n:'Kukka',el:'h_flower'},{n:'Rusetti',el:'h_bow'},{n:'Lippis',el:'h_cap'},{n:'Noitahattu',el:'h_witch'}];
const EXTRA=[{n:'Ei mitään'},{n:'Siivet',el:'x_wings'},{n:'Taikasauva',el:'x_wand'},{n:'Kaulakoru',el:'x_neck'},{n:'Reppu',el:'x_bag'},{n:'Huivi',el:'x_scarf'},{n:'Lasit',el:'x_glasses'},{n:'Miekka',el:'x_sword'},{n:'Kitara',el:'x_guitar'}];
const EYEC=['#6B4A2E','#2E6B4A','#2E4A6B','#6B2E2E','#4A2E6B','#2E6B6B','#6B6B2E'];

const doll=document.getElementById('doll');
let st={type:0,expr:0,skin:1,hair:0,hairc:2,outfit:0,outc:0,head:0,extra:0,bg:0,eye:0};

function setV(n,v){doll.style.setProperty(n,v);}
function show(prefix,idx,max){for(let i=0;i<max;i++){const e=document.getElementById(prefix+i);if(e)e.style.display=(i===idx?'inline':'none');}}
function render(){
  setV('--skin',SKIN[st.skin]);setV('--hair',HAIR[st.hairc]);setV('--outfit',OUTFIT[st.outc]);
  const b=BG[st.bg];document.getElementById('bg').setAttribute('fill',b.c);
  document.getElementById('pat_star').style.display=(b.p==='star'?'inline':'none');
  document.getElementById('pat_rainbow').style.display=(b.p==='rainbow'?'inline':'none');
  show('hair',st.hair,9);show('outfit',st.outfit,8);show('type',st.type,7);show('m',st.expr,4);
  document.getElementById('eyeL').setAttribute('fill',EYEC[st.eye]);
  document.getElementById('eyeR').setAttribute('fill',EYEC[st.eye]);
  document.querySelectorAll('.hw').forEach(e=>e.style.display='none');
  const hel=document.getElementById(HEAD[st.head].el);if(hel)hel.style.display='inline';
  document.querySelectorAll('.ex').forEach(e=>e.style.display='none');
  if(EXTRA[st.extra]&&EXTRA[st.extra].el){const xe=document.getElementById(EXTRA[st.extra].el);if(xe)xe.style.display='inline';}
  document.querySelectorAll('[data-pick]').forEach(b=>{const[k,i]=b.dataset.pick.split(':');const on=st[k]==i;b.style.outline=(on?'3px solid #FFD93B':'none');b.style.outlineOffset='2px';});
}
function pick(k,i){st[k]=parseInt(i);render();}
function rnd(a){return Math.floor(Math.random()*a.length);}
function surprise(){st.type=rnd(TYPES);st.expr=rnd(EXPR);st.skin=rnd(SKIN);st.hair=rnd(HAIRSTYLES);st.hairc=rnd(HAIR);st.outfit=rnd(OUTFITS);st.outc=rnd(OUTFIT);st.head=rnd(HEAD);st.extra=rnd(EXTRA);st.bg=rnd(BG);st.eye=rnd(EYEC);render();}

function row(label,key,items,colors){
  let h='<div><div class="row-label">'+label+'</div><div class="btns">';
  items.forEach((it,i)=>{
    if(colors){const col=(it.c!==undefined?it.c:it);h+='<button data-pick="'+key+':'+i+'" class="swatch" onclick="pick(\''+key+'\','+i+')" style="background:'+col+';" title="'+col+'"></button>';}
    else{const lbl=(it.n!==undefined?it.n:it);h+='<button data-pick="'+key+':'+i+'" class="btn" onclick="pick(\''+key+'\','+i+'\')">'+lbl+'</button>';}
  });
  return h+'</div></div>';
}
document.getElementById('panel').innerHTML=
  row('Hahmo','type',TYPES,false)+
  row('Ilme','expr',EXPR,false)+
  row('Hiusmalli','hair',HAIRSTYLES,false)+
  row('Hiusten väri','hairc',HAIR,true)+
  row('Silmien väri','eye',EYEC,true)+
  row('Vaatteet','outfit',OUTFITS,false)+
  row('Vaatteiden väri','outc',OUTFIT,true)+
  row('Päähine','head',HEAD,false)+
  row('Lisäosa','extra',EXTRA,false)+
  row('Ihonväri','skin',SKIN,true)+
  row('Tausta','bg',BG,true)+
  '<button class="save-btn" onclick="savePng()">📸 Tallenna kuva</button>';

function savePng(){
  const s=new XMLSerializer();const str=s.serializeToString(doll);
  const blob=new Blob([str],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hahmo.svg';a.click();
}
render();
</script>
</body>
</html>
