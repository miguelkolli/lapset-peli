<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alma & Elsan Pelit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0015;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
h1{color:#FFD93B;font-size:clamp(24px,6vw,48px);font-weight:900;text-align:center;text-shadow:0 0 30px #FF6FA4;margin-bottom:8px;}
.sub{color:#C8A2F0;font-size:16px;margin-bottom:40px;text-align:center;}
.games{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:700px;}
.game-card{background:linear-gradient(135deg,#1a0a2e,#2d1b4e);border:2px solid rgba(255,255,255,0.15);border-radius:24px;padding:32px 28px;text-decoration:none;color:#fff;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:220px;flex:1;}
.game-card:hover{transform:scale(1.05);border-color:#FFD93B;box-shadow:0 0 30px rgba(255,217,59,0.3);}
.game-card .icon{font-size:56px;}
.game-card .title{font-size:20px;font-weight:800;color:#FFD93B;text-align:center;}
.game-card .desc{font-size:14px;color:#C8A2F0;text-align:center;line-height:1.5;}
.game-card .play{margin-top:8px;padding:10px 24px;border-radius:12px;background:linear-gradient(90deg,#FF6FA4,#7C6BF0);color:#fff;font-size:15px;font-weight:700;border:none;}
</style>
</head>
<body>
<h1>✨ Alma & Elsan Pelit ✨</h1>
<p class="sub">Valitse peli!</p>
<div class="games">
  <a class="game-card" href="pukupeli.html">
    <div class="icon">👗</div>
    <div class="title">Pukupeli</div>
    <div class="desc">Pue hahmo juuri sellaiseksi kuin haluat! Vaihda hiuksia, vaatteita, koruja ja paljon muuta.</div>
    <div class="play">Pelaa! ▶</div>
  </a>
  <a class="game-card" href="alma-elsa-seikkailee.html">
    <div class="icon">🌟</div>
    <div class="title">Alma ja Elsa seikkailee</div>
    <div class="desc">Seikkaile 8 eri maailmassa! Pue Alma ja Elsa hienoihin asuihin joka maailmassa.</div>
    <div class="play">Pelaa! ▶</div>
  </a>
</div>
</body>
</html>
